<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ff758c, #ff7eb3);
        color: white;
        overflow-x: hidden;
        text-align: center;
    }

    h1 {
        margin-top: 50px;
        font-size: 2.8em;
        animation: fadeIn 2s ease-in-out;
    }

    p {
        font-size: 1.2em;
    }

    .typing {
        border-right: 3px solid white;
        display: inline-block;
        padding-right: 5px;
        animation: blink 1s infinite;
    }

    @keyframes blink {
        50% { border-color: transparent; }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    img {
        width: 250px;
        border-radius: 20px;
        margin-top: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    button {
        padding: 12px 25px;
        border: none;
        background: white;
        color: #ff4b7d;
        font-size: 1em;
        border-radius: 20px;
        margin-top: 20px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        transform: scale(1.1);
    }

    .message {
        margin-top: 20px;
        font-size: 1.3em;
        display: none;
    }

    .heart {
        position: fixed;
        bottom: -10px;
        font-size: 20px;
        animation: float 5s linear infinite;
    }

    @keyframes float {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(-100vh); opacity: 0; }
    }
</style>
</head>

<body>

<h1>🎂 Happy Birthday <span id="name">My Love</span> 💖</h1>

<p class="typing" id="typingText"></p>

<img src="https://via.placeholder.com/250" id="photo">

<br>

<button onclick="showMessage()">Click for Surprise 💝</button>

<p class="message" id="message">
    You are the most special person in my life ❤️  
    I am lucky to have you forever 💫  
</p>

<!-- Music -->
<audio autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
    // ✨ CHANGE THIS TEXT
    const text = "You make my world beautiful... I love you ❤️";

    let i = 0;
    function typingEffect() {
        if (i < text.length) {
            document.getElementById("typingText").innerHTML += text.charAt(i);
            i++;
            setTimeout(typingEffect, 50);
        }
    }
    typingEffect();

    function showMessage() {
        document.getElementById("message").style.display = "block";
    }

    // Floating Hearts 💕
    function createHeart() {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 10) + "px";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }

    setInterval(createHeart, 300);
</script>

</body>
</html>
